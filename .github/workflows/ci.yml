name: CI

on:
  pull_request:

# Touches nothing in package.json: Lighthouse CI runs via npx, pulling a pinned version
# on demand rather than becoming a project dependency.
jobs:
  quality-gates:
    name: Lighthouse + prose lint
    runs-on: ubuntu-latest
    steps:
      # v5 on both. The v4 tags run on Node 20, which is being removed from runners, and this
      # workflow was emitting a deprecation warning on every PR.
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      # Type-checks .astro frontmatter and inline scripts. The script has existed since
      # Wave 0 but was never wired into CI, so TypeScript errors could ship - six were
      # sitting in main when this step was added (five in SiteHeader's nav controller,
      # one widened prop literal in the styleguide), all fixed in the same commit.
      # Runs before the build so a type error fails fast rather than after Lighthouse.
      - name: Type check
        run: npm run check

      # `npm run build` now carries two redirect hooks: `prebuild` regenerates
      # public/_redirects from redirects.csv, and `postbuild` asserts every internal
      # redirect target resolves to a real page in dist/.
      - run: npm run build

      # public/_redirects is generated, so a hand-edit or a stale commit would silently
      # ship a redirect map that does not match its source of truth. prebuild has just
      # rewritten it from the CSV; if that changed anything, the committed copy was wrong.
      - name: Redirect artifact is in sync with redirects.csv
        run: git diff --exit-code -- public/_redirects

      # IMPORTANT: the npm package literally named "lhci" is an unrelated, unofficial
      # package (it just prints a greeting) - a trap discovered while wiring this job up.
      # The real Lighthouse CI package is "@lhci/cli". Pinned so a new lhci release can't
      # silently change what this gate asserts.
      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.15.1 autorun --config=./.lighthouserc.json

      # Same job as the performance gate (mistakes-log M2): a cheap grep-style check over
      # src/content/**/*.mdx for an em dash or "comprehensive" in prose, excepting labels
      # and data (see scripts/prose-lint.mjs's ALLOWLIST).
      - name: Prose lint
        run: node scripts/prose-lint.mjs
